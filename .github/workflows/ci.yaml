name: CI

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          make setup-venv
          make install-dev

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Run unit tests
        run: make test

      - name: Coverage (with threshold)
        run: make coverage

  package-pex:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          make setup-venv
          make install-dev

      - name: Build and smoke-check .pex artifact
        run: make smoke-pex

      - name: Upload .pex artifact
        uses: actions/upload-artifact@v4
        with:
          name: engllm-chat-pex
          path: dist/*.pex
          if-no-files-found: error

  release-pex:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-pex
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download .pex artifact
        uses: actions/download-artifact@v4
        with:
          name: engllm-chat-pex
          path: release-artifacts

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.pex
          fail_on_unmatched_files: true
